name: GitHub Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          npm install --global web-ext

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          current_tag="$(git describe --tags --abbrev=0)"

          if git describe --tags --abbrev=0 "${current_tag}^" >/dev/null 2>&1
          then
            previous_tag="$(git describe --tags --abbrev=0 "${current_tag}^")"
          else
            previous_tag="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          changelog="$(
            git log "${previous_tag}..${current_tag}" \
              --oneline \
              --no-merges \
              --pretty=format:"%h %s"
          )"

          if [[ -z "${changelog}" ]]
          then
            changelog="No changes recorded."
          fi

          delimiter="$(openssl rand -hex 12)"
          {
            echo "changelog<<${delimiter}"
            echo "${changelog}"
            echo "${delimiter}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build Python distributions
        run: python -m build

      - name: Package browser artifacts
        run: ./scripts/package-browser-artifacts.sh --version "${VERSION}"

      - name: Build Chrome CRX
        shell: bash
        env:
          CHROME_EXTENSION_KEY: ${{ secrets.CHROME_EXTENSION_KEY }}
        run: |
          key_args=()

          if [[ -n "${CHROME_EXTENSION_KEY:-}" ]]
          then
            key_file="$(mktemp)"
            trap 'rm -f "${key_file}"' EXIT
            printf '%s\n' "${CHROME_EXTENSION_KEY}" > "${key_file}"
            key_args=(--key-file "${key_file}" --no-pem-output)
          fi

          nix develop --command \
            ./scripts/package-chrome-crx.sh \
              --output-dir "$PWD/dist/browser" \
              --version "${VERSION}" \
              "${key_args[@]}"

      - name: Publish Firefox extension to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          ./scripts/sign-firefox-addon.sh \
            --channel listed \
            --amo-metadata "$PWD/assets/firefox/amo-metadata.json" \
            --approval-timeout 18000000 \
            --artifacts-dir "$PWD/dist/firefox-signed"

      - name: Normalize Firefox XPI artifact name
        shell: bash
        run: |
          mkdir -p dist/browser
          signed_xpi="$(find dist/firefox-signed -maxdepth 1 -type f -name '*.xpi' | head -n 1)"

          if [[ -z "${signed_xpi:-}" ]]
          then
            echo "Signed Firefox XPI not found" >&2
            exit 2
          fi

          cp "$signed_xpi" "dist/browser/bruvtab-firefox-${VERSION}.xpi"

      - name: Verify browser release assets
        shell: bash
        run: |
          test -f "dist/browser/bruvtab-chrome-${VERSION}.crx"
          test -f "dist/browser/bruvtab-firefox-${VERSION}.xpi"

      - name: Upload browser artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts-${{ env.VERSION }}
          path: |
            dist/browser/*.crx
            dist/browser/*.xpi
            dist/browser/*.zip
          if-no-files-found: error

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/browser/*.crx
            dist/browser/*.zip
            dist/browser/*.xpi
