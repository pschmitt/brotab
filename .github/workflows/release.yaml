name: GitHub Release

on:
  push:
    tags:
      - "*"

env:
  CHROME_EXTENSION_ID: edpgjheobdplebiikjgjgpmonakingef
  VERSION: ${{ github.ref_name }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          current_tag="$(git describe --tags --abbrev=0)"

          if git describe --tags --abbrev=0 "${current_tag}^" >/dev/null 2>&1
          then
            previous_tag="$(git describe --tags --abbrev=0 "${current_tag}^")"
          else
            previous_tag="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          changelog="$(
            git log "${previous_tag}..${current_tag}" \
              --oneline \
              --no-merges \
              --pretty=format:"%h %s"
          )"

          if [[ -z "${changelog}" ]]
          then
            changelog="No changes recorded."
          fi

          delimiter="$(openssl rand -hex 12)"
          {
            echo "changelog<<${delimiter}"
            echo "${changelog}"
            echo "${delimiter}"
          } >> "${GITHUB_OUTPUT}"

  python-distributions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build Python distributions
        run: python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-${{ env.VERSION }}
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error

  chrome-browser-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Package browser artifacts
        run: ./scripts/package-browser-artifacts.sh --version "${VERSION}"

      - name: Build Chrome CRX
        shell: bash
        env:
          CHROME_EXTENSION_KEY: ${{ secrets.CHROME_EXTENSION_KEY }}
        run: |
          key_args=()

          if [[ -n "${CHROME_EXTENSION_KEY:-}" ]]
          then
            key_file="$(mktemp)"
            trap 'rm -f "${key_file}"' EXIT
            printf '%s\n' "${CHROME_EXTENSION_KEY}" > "${key_file}"
            key_args=(--key-file "${key_file}" --no-pem-output)
          fi

          nix develop --command \
            ./scripts/package-chrome-crx.sh \
              --output-dir "$PWD/dist/browser" \
              --update-url "https://github.com/${{ github.repository }}/releases/latest/download/bruvtab-chrome-updates.xml" \
              --version "${VERSION}" \
              "${key_args[@]}"

      - name: Generate Chrome update manifest
        shell: bash
        run: |
          cp "dist/browser/bruvtab-chrome-${VERSION}.crx" "dist/browser/bruvtab-chrome.crx"
          ./scripts/generate-chrome-update-manifest.sh \
            --extension-id "${CHROME_EXTENSION_ID}" \
            --version "${VERSION}" \
            --codebase-url "https://github.com/${{ github.repository }}/releases/latest/download/bruvtab-chrome.crx" \
            --output "dist/browser/bruvtab-chrome-updates.xml"

      - name: Verify Chrome release assets
        shell: bash
        run: |
          test -f "dist/browser/bruvtab-chrome-${VERSION}.crx"
          test -f "dist/browser/bruvtab-chrome.crx"
          test -f "dist/browser/bruvtab-chrome-${VERSION}.zip"
          test -f "dist/browser/bruvtab-chrome-updates.xml"
          test -f "dist/browser/bruvtab-firefox-source-${VERSION}.zip"

      - name: Upload Chrome browser artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts-chrome-${{ env.VERSION }}
          path: |
            dist/browser/bruvtab-chrome-updates.xml
            dist/browser/bruvtab-chrome.crx
            dist/browser/bruvtab-chrome-${{ env.VERSION }}.crx
            dist/browser/bruvtab-chrome-${{ env.VERSION }}.zip
            dist/browser/bruvtab-firefox-source-${{ env.VERSION }}.zip
          if-no-files-found: error

  firefox-amo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install release tooling
        run: npm install --global web-ext

      - name: Publish Firefox extension to AMO
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          ./scripts/sign-firefox-addon.sh \
            --channel listed \
            --amo-metadata "$PWD/assets/firefox/amo-metadata.json" \
            --approval-timeout 0 \
            --artifacts-dir "$PWD/dist/firefox-amo-signed"

      - name: Normalize AMO Firefox XPI artifact name
        shell: bash
        run: |
          mkdir -p dist/browser
          amo_xpi="$(find dist/firefox-amo-signed -maxdepth 1 -type f -name '*.xpi' | head -n 1)"

          if [[ -n "${amo_xpi:-}" ]]
          then
            cp "$amo_xpi" "dist/browser/bruvtab-firefox-amo-${VERSION}.xpi"
          fi

      - name: Upload AMO Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts-firefox-amo-${{ env.VERSION }}
          path: dist/browser/bruvtab-firefox-amo-${{ env.VERSION }}.xpi
          if-no-files-found: ignore

  firefox-self-signed:
    runs-on: ubuntu-latest
    env:
      SELF_FIREFOX_VERSION: ${{ github.ref_name }}.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install release tooling
        run: npm install --global web-ext

      - name: Sign Firefox extension for GitHub release
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          ./scripts/sign-firefox-addon.sh \
            --channel unlisted \
            --manifest-version "${SELF_FIREFOX_VERSION}" \
            --artifacts-dir "$PWD/dist/firefox-self-signed"

      - name: Normalize self-signed Firefox XPI artifact name
        shell: bash
        run: |
          mkdir -p dist/browser
          self_xpi="$(find dist/firefox-self-signed -maxdepth 1 -type f -name '*.xpi' | head -n 1)"

          if [[ -z "${self_xpi:-}" ]]
          then
            echo "Self-distributed Firefox XPI not found" >&2
            exit 2
          fi

          cp "$self_xpi" "dist/browser/bruvtab-firefox-${VERSION}.xpi"

      - name: Verify self-signed Firefox artifact
        shell: bash
        run: test -f "dist/browser/bruvtab-firefox-${VERSION}.xpi"

      - name: Upload self-signed Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-artifacts-firefox-self-signed-${{ env.VERSION }}
          path: dist/browser/bruvtab-firefox-${{ env.VERSION }}.xpi
          if-no-files-found: error

  chrome-web-store:
    runs-on: ubuntu-latest
    needs:
      - chrome-browser-artifacts
    continue-on-error: true
    steps:
      - name: Download Chrome browser artifacts
        uses: actions/download-artifact@v4
        with:
          name: browser-artifacts-chrome-${{ env.VERSION }}
          path: dist/browser

      - name: Check Chrome Web Store credentials
        id: chrome-webstore-credentials
        shell: bash
        env:
          CHROME_WEBSTORE_CLIENT_ID: ${{ secrets.CHROME_WEBSTORE_CLIENT_ID }}
          CHROME_WEBSTORE_CLIENT_SECRET: ${{ secrets.CHROME_WEBSTORE_CLIENT_SECRET }}
          CHROME_WEBSTORE_REFRESH_TOKEN: ${{ secrets.CHROME_WEBSTORE_REFRESH_TOKEN }}
        run: |
          if [[ -n "${CHROME_WEBSTORE_CLIENT_ID:-}" ]] \
            && [[ -n "${CHROME_WEBSTORE_CLIENT_SECRET:-}" ]] \
            && [[ -n "${CHROME_WEBSTORE_REFRESH_TOKEN:-}" ]]
          then
            echo "configured=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::Skipping Chrome Web Store publish because CHROME_WEBSTORE_* secrets are not configured."
          echo "configured=0" >> "$GITHUB_OUTPUT"

      - name: Publish Chrome extension to Chrome Web Store
        if: steps.chrome-webstore-credentials.outputs.configured == '1'
        uses: puzzlers-labs/chrome-webstore-publish@v1
        with:
          mode: publish
          extension_id: bkifkhiemhgpnomgdcbcbkifekkecnhk
          zip_file_path: ./dist/browser/bruvtab-chrome-${{ env.VERSION }}.zip
          client_id: ${{ secrets.CHROME_WEBSTORE_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_WEBSTORE_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_WEBSTORE_REFRESH_TOKEN }}
          publish_target: public

  release:
    runs-on: ubuntu-latest
    needs:
      - changelog
      - python-distributions
      - chrome-browser-artifacts
      - firefox-amo
      - firefox-self-signed
    permissions:
      contents: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions-${{ env.VERSION }}
          path: dist

      - name: Download browser artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: browser-artifacts-*-${{ env.VERSION }}
          path: dist/browser
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          test -f "dist/bruvtab-${VERSION}.tar.gz"
          test -f "dist/bruvtab-${VERSION}-py3-none-any.whl"
          test -f "dist/browser/bruvtab-chrome-updates.xml"
          test -f "dist/browser/bruvtab-chrome.crx"
          test -f "dist/browser/bruvtab-chrome-${VERSION}.crx"
          test -f "dist/browser/bruvtab-chrome-${VERSION}.zip"
          test -f "dist/browser/bruvtab-firefox-${VERSION}.xpi"
          test -f "dist/browser/bruvtab-firefox-source-${VERSION}.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.changelog.outputs.changelog }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/browser/*.crx
            dist/browser/*.xml
            dist/browser/*.zip
            dist/browser/*.xpi
