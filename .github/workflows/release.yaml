name: GitHub Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          npm install --global web-ext

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          current_tag="$(git describe --tags --abbrev=0)"

          if git describe --tags --abbrev=0 "${current_tag}^" >/dev/null 2>&1
          then
            previous_tag="$(git describe --tags --abbrev=0 "${current_tag}^")"
          else
            previous_tag="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          changelog="$(
            git log "${previous_tag}..${current_tag}" \
              --oneline \
              --no-merges \
              --pretty=format:"%h %s"
          )"

          if [[ -z "${changelog}" ]]
          then
            changelog="No changes recorded."
          fi

          delimiter="$(openssl rand -hex 12)"
          {
            echo "changelog<<${delimiter}"
            echo "${changelog}"
            echo "${delimiter}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build Python distributions
        run: python -m build

      - name: Package browser artifacts
        run: ./scripts/package-browser-artifacts.sh --version "${VERSION}"

      - name: Sign Firefox extension
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          ./scripts/sign-firefox-addon.sh \
            --channel unlisted \
            --artifacts-dir "$PWD/dist/firefox-signed"

      - name: Normalize Firefox XPI artifact name
        shell: bash
        run: |
          mkdir -p dist/browser
          signed_xpi="$(find dist/firefox-signed -maxdepth 1 -type f -name '*.xpi' | head -n 1)"

          if [[ -z "${signed_xpi:-}" ]]
          then
            echo "Signed Firefox XPI not found" >&2
            exit 2
          fi

          cp "$signed_xpi" "dist/browser/bruvtab-firefox-${VERSION}.xpi"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/browser/*.zip
            dist/browser/*.xpi
