name: Pin Release Assets

on:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - GitHub Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to pin
        required: true
        type: string

jobs:
  pin-release-assets:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update flake asset hashes
        id: update
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_DISPATCH_VERSION: ${{ inputs.version }}
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
          WORKFLOW_RUN_VERSION: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          version="${WORKFLOW_DISPATCH_VERSION:-${RELEASE_VERSION:-${WORKFLOW_RUN_VERSION:-}}}"
          version="${version#refs/tags/}"

          if [[ -z "${version:-}" ]]
          then
            echo "Unable to determine release version" >&2
            exit 2
          fi

          release_json="$(gh release view "$version" --json assets)"

          digest_for() {
            local asset_name="$1"

            jq -er --arg name "$asset_name" \
              '.assets[] | select(.name == $name) | .digest' \
              <<< "$release_json"
          }

          sri_from_digest() {
            local digest="$1"
            local hex="${digest#sha256:}"

            python3 -c 'import base64, sys; print("sha256-" + base64.b64encode(bytes.fromhex(sys.argv[1])).decode())' "$hex"
          }

          chrome_hash="$(sri_from_digest "$(digest_for "bruvtab-chrome-${version}.crx")")"
          firefox_hash="$(sri_from_digest "$(digest_for "bruvtab-firefox-${version}.xpi")")"

          export VERSION="$version"
          export CHROME_HASH="$chrome_hash"
          export FIREFOX_HASH="$firefox_hash"

          perl -0pi -e 's/(      version = ")[^"]+(";)/$1$ENV{VERSION}$2/' flake.nix
          perl -0pi -e 's/(      chromeCrxHash = ")[^"]+(";)/$1$ENV{CHROME_HASH}$2/' flake.nix
          perl -0pi -e 's/(      firefoxXpiHash = ")[^"]+(";)/$1$ENV{FIREFOX_HASH}$2/' flake.nix

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/pin-release-assets-${{ steps.update.outputs.version }}
          commit-message: Pin ${{ steps.update.outputs.version }} release asset hashes
          title: Pin ${{ steps.update.outputs.version }} release asset hashes
          body: Updates `flake.nix` to the CRX/XPI hashes published by the `${{ steps.update.outputs.version }}` GitHub release.
